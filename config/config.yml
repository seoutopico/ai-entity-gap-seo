source:
  posts_csv: "data/raw/posts.csv"
  external_entities_csv: "data/raw/external_entities.csv"

output:
  posts_csv: "data/processed/posts.csv"
  entities_raw_csv: "outputs/entities_raw.csv"   # crudo de la API (cache, sin filtrar)
  entities_csv: "outputs/entities.csv"           # limpio (post-filtrado)

extraction:
  engine: "gcp"                  # motor de extracción: Google Cloud Natural Language
  api_version: "v1"              # v1 devuelve salience + metadata (mid, wikipedia_url)
  api_key_env: "GOOGLE_NL_API_KEY"  # nombre de la variable en .env
  language: ""                   # vacío = autodetección. El idioma del proyecto lo manda el brief.
  include_title: true            # analiza title + text (el título pesa para SEO)
  min_salience: 0.0              # descarta entidades por debajo de este salience (0-1)
  require_kg_mid: false          # true = solo entidades enlazadas al Knowledge Graph
  min_entity_chars: 2
  request_timeout: 30
  # --- Topes duros de coste por ejecución (0 = sin límite) ---
  max_requests: 200              # corta tras N peticiones a la API
  max_chars: 2000000             # corta antes de superar N caracteres (~2.000 unidades)
  # --- Tope ABSOLUTO mensual acumulado entre ejecuciones (capa gratuita) ---
  monthly_unit_cap: 5000         # NUNCA enviar más de 5.000 unidades/mes (0 = sin límite)
  usage_file: ".usage/nl_usage.json"  # contador persistente del consumo mensual

cleaning:
  # Tipos de Google que NO son entidades de contenido para SEO.
  exclude_types:
    - number
    - date
    - price
    - phone_number
    - address
  min_salience: 0.001        # descarta menciones con salience por debajo de esto
  max_entity_words: 6        # descarta "entidades" que son títulos/frases largas
  # Pronombres y genéricos que Google tipa mal (person/other) y no son entidades.
  blocklist:
    - todo
    - algo
    - cosa
    - cosas
    - nada
    - nadie
    - alguien
    - vez
    - veces
    - tema
    - manera
    - forma
    - parte
    - partes
    - momento
    - caso
    - tipo
    - mundo
    - gente
    - persona
    - personas
    - responsable
    - becario
  # NOTA: la marca/boilerplate (brand_terms) NO va aquí: es contexto de proyecto.
  # Vive en projects/<id>/project.json -> brief.brand_terms y la usa el agente
  # entity-curator (fase 3) para marcar type=brand.

# ontology: NO va aquí (es el tipado del DOMINIO, depende del contenido).
#   Vive en projects/<id>/project.json -> brief.ontology, generado por la skill
#   nuevo-proyecto leyendo el contenido. load_project_config() lo inyecta.

trends:
  enabled: true
  geo: ""                         # vacío = global. El geo del proyecto lo manda el brief.
  hl: ""                          # idioma de interfaz; derivado del brief (idioma-geo).
  timeframe: "today 12-m"         # ventana temporal
  referer: "https://www.google.com/"   # evita el 429 de related_queries/topics
  request_delay: 4.0              # segundos entre peticiones (Trends rate-limita fuerte)
  max_seeds: 15                   # nº de entidades semilla a consultar por ejecución
  seed_min_salience: 0.05         # salience acumulada mínima para ser semilla
  seed_types:                     # tipos de entidad válidos como semilla (evita genéricos)
    - tool
    - concept
    - platform
    - organization
    - consumer_good
    - discipline
  fetch_topics: true              # también related_topics (entidades del Knowledge Graph)
  cache_csv: "data/raw/trends_related.csv"   # cache acumulativo; no reconsulta semillas ya hechas

scoring:
  shallow_post_threshold: 2
  orphan_entity_threshold: 1
  weights:
    external: 0.45
    search_console: 0.35
    internal_gap: 0.20
  opportunity_thresholds:
    high: 0.70
    medium: 0.40
